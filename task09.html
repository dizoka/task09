<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Робота з зображеннями 9</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<!-- Картинка з рамкою -->
<div class="container mt-5 text-center">
    <h2 class="mb-4">Картинка з рамкою</h2>

    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=700"
         class="img-thumbnail"
         alt="Природа">
</div>

<!-- Підпис до зображення -->
<div class="container mt-5 text-center">
    <h2 class="mb-4">Підпис до зображення</h2>

    <figure class="figure">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=700"
             class="figure-img img-fluid rounded"
             alt="Гори">

        <figcaption class="figure-caption">
            Гарний краєвид гір на заході сонця.
        </figcaption>
    </figure>
</div>

<!-- Анонс статей -->
<div class="container mt-5 mb-5">
    <h2 class="text-center mb-4">Анонс статей</h2>

    <div class="row g-4">

        <!-- Картка 1 -->
        <div class="col-md-6">
            <div class="card h-100">
                <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600"
                     class="card-img-top"
                     alt="Карпати">

                <div class="card-body">
                    <h5 class="card-title">Подорож у Карпати</h5>

                    <p class="card-text">
                        Карпати — чудове місце для відпочинку,
                        походів та знайомства з природою України.
                    </p>

                    <a href="https://uk.wikipedia.org/wiki/Карпати"
                       class="btn btn-success"
                       target="_blank">
                        Прочитати більше
                    </a>
                </div>
            </div>
        </div>

        <!-- Картка 2 -->
        <div class="col-md-6">
            <div class="card h-100">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600"
                     class="card-img-top"
                     alt="Море">

                <div class="card-body">
                    <h5 class="card-title">Відпочинок біля моря</h5>

                    <p class="card-text">
                        Морський відпочинок дарує гарний настрій,
                        сонце, пляжі та незабутні враження.
                    </p>

                    <a href="https://uk.wikipedia.org/wiki/Чорне_море"
                       class="btn btn-info"
                       target="_blank">
                        Прочитати більше
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
